<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏季居家健康指南</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🌿 夏季居家健康指南</h1>
  <p>簡單檢查，保護全家健康</p>
</header>

<main>

  <!-- 卡片學習 -->
  <section class="card-grid">
    <div class="card">
      <h3>🪳 蟑螂</h3>
      <p>廚房不乾淨容易吸引蟑螂</p>
    </div>

    <div class="card">
      <h3>👋 霉味</h3>
      <p>濕氣重會讓衣櫥發霉</p>
    </div>

    <div class="card">
      <h3>🦟 蚊子</h3>
      <p>積水容易孳生蚊子</p>
    </div>

    <div class="card">
      <h3>🌫 空氣</h3>
      <p>空氣不好要避免外曬</p>
    </div>
  </section>

  <!-- 家庭檢測（核心） -->
  <section class="family">
    <h2>👨‍👩‍👧 家庭健康檢測</h2>

    <label><input type="checkbox"> 廚房有食物殘渣</label><br>
    <label><input type="checkbox"> 衣櫥有霉味</label><br>
    <label><input type="checkbox"> 常被蚊子叮</label><br>
    <label><input type="checkbox"> 晾衣時間不固定</label><br>

    <button onclick="calculateScore()">查看結果</button>

    <div id="result"></div>
  </section>

  <!-- AI導流 -->
  <section class="app">
    <h2>📱 想更輕鬆？</h2>
    <p>讓AI幫你每天提醒與安排</p>

    <button onclick="goToApp()">👉 進入AI健康助手</button>

    <p>或用手機掃描</p>
    <img src="qr-code.png" alt="QR Code" width="150">
  </section>

</main>

<footer>
  © 2026 家庭健康設計
</footer>

<script src="script.js"></script>
</body>
</html>
