<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夏季居家健康指南</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Icon CDN 正確寫法 -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="hero">
  <h1>🌿 夏季居家健康指南</h1>
  <p>守護家人健康，從每天小習慣開始</p>
</header>

<main>

<section class="cards">

  <div class="card">
    <i class="fa-solid fa-bug"></i>
    <h3>蟑螂防治</h3>
    <p>保持廚房乾淨</p>
  </div>

  <div class="card">
    <i class="fa-solid fa-cloud-rain"></i>
    <h3>濕氣控制</h3>
    <p>防止霉味</p>
  </div>

  <div class="card">
    <i class="fa-solid fa-wind"></i>
    <h3>空氣流通</h3>
    <p>增加通風</p>
  </div>

  <div class="card">
    <i class="fa-solid fa-shirt"></i>
    <h3>晾衣建議</h3>
    <p>避開污染時段</p>
  </div>

</section>

<!-- ✅ 家庭檢測 -->
<section class="family">
  <h2>👨‍👩‍👧 家庭健康檢測</h2>

  <label><input type="checkbox"> 廚房有殘渣</label><br>
  <label><input type="checkbox"> 衣櫥潮濕</label><br>
  <label><input type="checkbox"> 常被蚊子叮</label><br>
  <label><input type="checkbox"> 晾衣時間不固定</label><br>

  <button onclick="calculateScore()">查看結果</button>

  <div id="result"></div>
</section>

<!-- ✅ AI導流 -->
<section class="app">
  <h2>📱 AI 健康助手</h2>

  <button onclick="goToApp()">👉 開啟 AI App</button>

  <p>手機掃描：</p>
  <img src="qr.png" class="qr">
</section>

</main>

<footer>
  © 2026 居家健康宣導
</footer>

<script src="script.js"></script>

</body>
</html>
``
